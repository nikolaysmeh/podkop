services:

  server:
    build: ./server
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    env_file:
      - .env
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:'+process.env.SERVER_PORT+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  client:
    build: ./client
    env_file:
      - .env
    volumes:
      - ./client/webhooks.json:/app/webhooks.json:ro
    restart: unless-stopped

  target:
    build: ./target
    ports:
      - "${TARGET_PORT}:${TARGET_PORT}"
    env_file:
      - .env
    restart: unless-stopped

