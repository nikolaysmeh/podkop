services:

  server:
    build:
      context: ./server
      target: production
    ports:
      - "80:80"
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    env_file:
      - path: .env
        required: false
      - path: ./server/.env
        required: false
    volumes:
      - ./data:/data
      - caddy_data:/root/.local/share/caddy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const ssl=process.env.SSL_SUPPORTED==='true'; const p=ssl?(+process.env.SERVER_PORT+1):+process.env.SERVER_PORT; require('http').get('http://localhost:'+p+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  client:
    build:
      context: ./client
      target: production
    env_file:
      - path: .env
        required: false
      - path: ./client/.env
        required: false
    volumes:
      - ./client/webhooks.json:/app/webhooks.json:ro
    restart: unless-stopped

  target:
    build: ./target
    ports:
      - "${TARGET_PORT:-4000}:${TARGET_PORT:-4000}"
    env_file:
      - path: .env
        required: false
      - path: ./target/.env
        required: false
    restart: unless-stopped

  server-test:
    build:
      context: ./server
      target: test
    profiles:
      - test

  client-test:
    build:
      context: ./client
      target: test
    profiles:
      - test

volumes:
  caddy_data:
