<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Podkop Admin</title>
<link rel="stylesheet" href="/admin/styles.css">
</head><body>
<nav>
  <span class="logo">&#x26A1; Podkop Admin</span>
  <button class="active" onclick="tab('dashboard',this)">Dashboard</button>
  <button onclick="tab('endpoints',this)">Endpoints</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('settings',this)">Settings</button>
  <span class="spacer"></span>
  <form method="POST" action="/admin/logout" style="display:inline">
    <button type="submit" style="font-size:12px;padding:5px 10px">Logout</button>
  </form>
</nav>

<div class="content">

<!-- Dashboard -->
<div id="tab-dashboard" class="tab-c active">
  <div class="stats" id="stats-grid"></div>
  <div class="card">
    <div class="toolbar"><h2>Endpoints</h2>
      <button class="btn btn-s" onclick="loadDashboard()">&#x21BB; Refresh</button>
    </div>
    <div id="dash-table"></div>
  </div>
</div>

<!-- Endpoints -->
<div id="tab-endpoints" class="tab-c">
  <div class="card">
    <h2>Create Endpoint</h2>
    <div class="form-row">
      <div class="fg"><label>Name</label><input type="text" id="en" placeholder="payments"></div>
      <div class="fg"><label>Username (optional)</label><input type="text" id="eu" placeholder="alice"></div>
      <div class="fg"><label>Password (optional)</label><input type="password" id="ep" placeholder="secret"></div>
      <button class="btn btn-p" onclick="createEp()" style="margin-top:16px">Create</button>
    </div>
  </div>
  <div class="card">
    <div class="toolbar"><h2>Endpoints</h2>
      <button class="btn btn-s" onclick="loadEndpoints()">&#x21BB; Refresh</button>
    </div>
    <div id="ep-list"></div>
  </div>
</div>

<!-- Logs -->
<div id="tab-logs" class="tab-c">
  <div class="card">
    <div class="log-bar">
      <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
      <select id="lv-filter" onchange="renderLogs()">
        <option value="">All levels</option>
        <option value="info">Info</option>
        <option value="warn">Warn</option>
        <option value="error">Error</option>
      </select>
      <button class="btn btn-s" onclick="loadLogs()">&#x21BB; Refresh</button>
      <button class="btn btn-s" onclick="clearLogs()">Clear</button>
      <label style="margin-left:auto">
        <input type="checkbox" id="live-chk" onchange="toggleLive(this.checked)"> Live (5 s)
      </label>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<!-- Settings -->
<div id="tab-settings" class="tab-c">
  <div class="card">
    <div class="toolbar"><h2>Configuration</h2>
      <button class="btn btn-s" onclick="loadSettings()">&#x21BB; Refresh</button>
    </div>
    <div id="settings-content"></div>
  </div>
</div>

</div><!-- /content -->

<div class="toasts" id="toasts"></div>

<script>
'use strict';
let allLogs = [], liveTimer = null;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, credentials: 'include', headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || 'HTTP ' + r.status);
  return d;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, ok) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + (ok !== false ? 't-ok' : 't-err');
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('on')));
  setTimeout(() => { el.classList.remove('on'); setTimeout(() => el.remove(), 300); }, 3500);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function tab(name, btn) {
  document.querySelectorAll('.tab-c').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'endpoints') loadEndpoints();
  if (name === 'logs')      loadLogs();
  if (name === 'settings')  loadSettings();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    const { total_pending, endpoints } = await api('GET', '/api/admin/stats');
    document.getElementById('stats-grid').innerHTML =
      `<div class="stat"><div class="lbl">Endpoints</div><div class="val">${endpoints.length}</div></div>
       <div class="stat"><div class="lbl">Pending Webhooks</div><div class="val">${total_pending}</div></div>`;

    const rows = endpoints.length === 0
      ? '<tr><td colspan="3" class="empty">No endpoints yet</td></tr>'
      : endpoints.map(e =>
          `<tr><td><b>${x(e.name)}</b></td><td>${e.pending}</td><td>${e.deliveries}</td></tr>`
        ).join('');
    document.getElementById('dash-table').innerHTML =
      `<table><thead><tr><th>Endpoint</th><th>Pending</th><th>Deliveries</th></tr></thead>
       <tbody>${rows}</tbody></table>`;
  } catch(e) { toast(e.message, false); }
}

// ── Endpoints ─────────────────────────────────────────────────────────────────
async function loadEndpoints() {
  try {
    const [{ endpoints }, { endpoints: stats }] = await Promise.all([
      api('GET', '/api/admin/webhooks'),
      api('GET', '/api/admin/stats'),
    ]);
    const sm = Object.fromEntries((stats || []).map(s => [s.name, s]));

    if (!endpoints.length) {
      document.getElementById('ep-list').innerHTML = '<div class="empty">No endpoints. Create one above.</div>';
      return;
    }

    const rows = endpoints.map(ep => {
      const s = sm[ep.name] || {};
      const ab = ep.username
        ? `<span class="badge b-basic">basic (${x(ep.username)})</span>`
        : `<span class="badge b-open">open</span>`;
      const cfId = 'cf-' + ep.name;
      return `<tr>
        <td><b>${x(ep.name)}</b></td>
        <td class="mono skey" title="Click to copy" onclick="cp('${x(ep.secret_key)}','Secret key copied')">${ep.secret_key.slice(0,8)}…</td>
        <td>${ab}</td>
        <td>${s.pending ?? '—'}</td>
        <td class="mono" style="color:var(--muted);font-size:11px">${x(ep.created_at || '—')}</td>
        <td>
          <div class="btns">
            <button class="btn btn-s" onclick="cp(location.protocol+'//'+location.host+'/${x(ep.name)}','URL copied')">Copy URL</button>
            <button class="btn btn-s" onclick="toggleCf('${x(ep.name)}')">Credentials</button>
            <button class="btn btn-s" onclick="toggleMsg('${x(ep.name)}')">Messages</button>
            <button class="btn btn-s" onclick="purge('${x(ep.name)}')">Purge</button>
            <button class="btn btn-d" onclick="del('${x(ep.name)}')">Delete</button>
          </div>
          <div class="irow" id="${cfId}">
            <div class="fg"><label>Username</label><input type="text" id="cu-${x(ep.name)}" placeholder="${x(ep.username || 'alice')}"></div>
            <div class="fg"><label>Password</label><input type="password" id="cp-${x(ep.name)}" placeholder="new password"></div>
            <button class="btn btn-p" onclick="setCreds('${x(ep.name)}')">Save</button>
            <button class="btn btn-d" onclick="disableAuth('${x(ep.name)}')">Remove Auth</button>
            <button class="btn btn-s" onclick="toggleCf('${x(ep.name)}')">Cancel</button>
          </div>
        </td>
      </tr>
      <tr id="msg-${x(ep.name)}" class="msg-row" style="display:none">
        <td colspan="6">
          <div class="msg-panel-hd">
            <span>Messages for /${x(ep.name)}</span>
            <button class="btn btn-s" onclick="loadMessages('${x(ep.name)}')">&#x21BB; Refresh</button>
          </div>
          <div class="msg-body" id="msg-list-${x(ep.name)}"></div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('ep-list').innerHTML =
      `<table><thead><tr><th>Name</th><th>Secret Key</th><th>Auth</th>
        <th>Pending</th><th>Created</th><th>Actions</th></tr></thead>
       <tbody>${rows}</tbody></table>`;
  } catch(e) { toast(e.message, false); }
}

async function createEp() {
  const name = document.getElementById('en').value.trim();
  const user = document.getElementById('eu').value.trim();
  const pass = document.getElementById('ep').value;
  if (!name) return toast('Name is required', false);
  try {
    const d = await api('POST', '/api/admin/create-webhook',
      { name, username: user || undefined, password: pass || undefined });
    toast(`"${name}" created — secret key copied`);
    ['en','eu','ep'].forEach(id => document.getElementById(id).value = '');
    cp(d.secretKey, '');
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

async function purge(name) {
  if (!confirm(`Purge all buffered webhooks for "${name}"?`)) return;
  try {
    const d = await api('POST', `/api/admin/webhooks/${name}/purge`);
    toast(`Purged ${d.deleted} webhook(s)`);
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

async function del(name) {
  if (!confirm(`Delete endpoint "${name}" and all its webhooks? Cannot be undone.`)) return;
  try {
    await api('DELETE', `/api/admin/webhooks/${name}`);
    toast(`"${name}" deleted`);
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

function toggleCf(name) {
  document.getElementById('cf-' + name).classList.toggle('open');
}

async function setCreds(name) {
  const u = document.getElementById('cu-' + name).value.trim();
  const p = document.getElementById('cp-' + name).value;
  if (!u || !p) return toast('Username and password are required', false);
  try {
    await api('PATCH', `/api/admin/webhooks/${name}/credentials`, { username: u, password: p });
    toast(`Credentials updated for "${name}"`);
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

async function disableAuth(name) {
  if (!confirm(`Remove auth from "${name}"?`)) return;
  try {
    await api('PATCH', `/api/admin/webhooks/${name}/credentials`, {});
    toast(`Auth removed for "${name}"`);
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

// ── Messages ──────────────────────────────────────────────────────────────────
function toggleMsg(name) {
  const row = document.getElementById('msg-' + name);
  const visible = row.style.display !== 'none';
  row.style.display = visible ? 'none' : 'table-row';
  if (!visible) loadMessages(name);
}

async function loadMessages(name) {
  const el = document.getElementById('msg-list-' + name);
  el.innerHTML = '<div style="padding:10px 12px;color:var(--muted);font-size:12px">Loading…</div>';
  try {
    const { messages } = await api('GET', `/api/admin/webhooks/${name}/messages`);
    if (!messages.length) {
      el.innerHTML = '<div class="empty" style="padding:12px 0">No buffered messages</div>';
      return;
    }
    el.innerHTML = `<table>
      <thead><tr><th>ID</th><th>Method</th><th>Received At</th><th>Payload</th><th></th></tr></thead>
      <tbody>${messages.map(m => `<tr>
        <td class="mono">${x(String(m.id))}</td>
        <td class="mono">${x(m.method)}</td>
        <td class="mono" style="font-size:11px;white-space:nowrap">${x(m.received_at)}</td>
        <td class="pl-cell" title="${x(m.payload)}">${x(m.payload.slice(0, 120))}${m.payload.length > 120 ? '…' : ''}</td>
        <td><button class="btn btn-d" onclick="deleteMsg('${x(name)}',${Number(m.id)})">Delete</button></td>
      </tr>`).join('')}</tbody></table>`;
  } catch(e) { el.innerHTML = `<div style="padding:10px 12px;color:var(--danger)">${x(e.message)}</div>`; }
}

async function deleteMsg(name, id) {
  if (!confirm(`Delete message #${id} from "${name}"?`)) return;
  try {
    await api('DELETE', `/api/admin/webhooks/${name}/messages/${id}`);
    toast(`Message #${id} deleted`);
    loadMessages(name);
    loadEndpoints();
  } catch(e) { toast(e.message, false); }
}

// ── Logs ──────────────────────────────────────────────────────────────────────
async function loadLogs() {
  try {
    const { logs } = await api('GET', '/api/admin/logs?n=500');
    allLogs = logs;
    renderLogs();
  } catch(e) { toast(e.message, false); }
}

function renderLogs() {
  const f = document.getElementById('lv-filter').value;
  const items = f ? allLogs.filter(l => l.level === f) : allLogs;
  const box = document.getElementById('log-box');
  if (!items.length) {
    box.innerHTML = '<div style="color:#555;padding:4px 0">No log entries</div>';
    return;
  }
  box.innerHTML = items.map(l =>
    `<div class="le">
      <span class="le-ts">${l.ts.replace('T',' ').slice(0,19)}</span>
      <span class="le-lv lv-${l.level}">${l.level.toUpperCase()}</span>
      <span class="le-msg">${x(l.message)}</span>
    </div>`
  ).join('');
  if (document.getElementById('autoscroll').checked) box.scrollTop = box.scrollHeight;
}

function clearLogs() { allLogs = []; renderLogs(); }

function toggleLive(on) {
  clearInterval(liveTimer);
  if (on) liveTimer = setInterval(loadLogs, 5000);
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const { config } = await api('GET', '/api/admin/config');
    const rows = Object.entries(config).map(([k, v]) =>
      `<tr><td class="s-key">${x(k)}</td><td class="s-val">${x(v)}</td></tr>`
    ).join('');
    document.getElementById('settings-content').innerHTML =
      `<table><thead><tr><th>Variable</th><th>Value</th></tr></thead>
       <tbody>${rows}</tbody></table>`;
  } catch(e) { toast(e.message, false); }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cp(text, msg) {
  navigator.clipboard.writeText(text).catch(() => {}).then(() => { if (msg) toast(msg); });
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body></html>
